buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.10"
        reactNativeVersion = "0.73.0"
    }
    repositories {
        maven { url "$rootDir/../../node_modules/react-native/android" }
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.2.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.10")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath(files("$rootDir/../../node_modules/expo-modules-core/expo-module-gradle-plugin"))
    }
}

allprojects {
    repositories {
        maven { url "$rootDir/../../node_modules/react-native/android" }
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        google()
        mavenCentral()
    }
    configurations.all {
        resolutionStrategy.eachDependency { DependencyResolveDetails details ->
            if (details.requested.group == 'com.facebook.react') {
                if (details.requested.name == 'react-native') {
                    details.useTarget "com.facebook.react:react-android:0.73.0"
                } else if (details.requested.name == 'react-android' || details.requested.name == 'hermes-android') {
                    details.useVersion "0.73.0"
                }
            }
        }
    }
    afterEvaluate {
        if (project.hasProperty('android')) {
            android {
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
                // Fix for Kotlin jvmTarget mismatch
                if (project.plugins.hasPlugin('kotlin-android')) {
                    kotlinOptions {
                        jvmTarget = "17"
                    }
                }
            }
        }
        if (project.hasProperty('kotlin')) {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile) {
                kotlinOptions {
                    jvmTarget = "17"
                }
            }
        }
    }
}

// Run this task before the build task to ensure the app is properly configured
task clean(type: Delete) {
    delete rootProject.buildDir
}
