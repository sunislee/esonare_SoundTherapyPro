# 心声冥想 Web 版 - Nginx 优化配置
# 部署路径：C:\Users\Administrator\Desktop\nginx-1.24.0\nginx-1.24.0\conf\nginx.conf

worker_processes  1;

error_log  logs/error.log  warn;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip 压缩配置 - 提升加载速度
    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # 浏览器缓存优化 - 静态资源缓存 30 天
    # 第一次访问后，后续访问直接从本地缓存读取，无需联网
    server {
        listen       80;
        server_name  localhost;
        root   html;
        index  index.html;

        # 主页面 - 不缓存或短时间缓存，确保更新及时
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            
            # 安全头
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # CSS 文件 - 缓存 30 天
        location ~* \.css$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # JavaScript 文件 - 缓存 30 天
        location ~* \.js$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # 图片资源 - 缓存 30 天
        location ~* \.(png|jpg|jpeg|gif|svg|webp|ico)$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # 字体文件 - 缓存 30 天
        location ~* \.(woff|woff2|eot|ttf|otf)$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # 音频资源 - 缓存 30 天
        location ~* \.(mp3|wav|m4a|ogg)$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # React 路由支持 - 所有路径都返回 index.html
        location / {
            try_files $uri $uri/ /index.html;
            
            # 安全头
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 错误页面配置
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root html;
        }
    }
}
