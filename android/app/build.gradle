apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)

android {
    namespace "com.anonymous.soundtherapyapp"
    compileSdkVersion rootProject.ext.compileSdkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            storeFile file(MYAPP_RELEASE_STORE_FILE)
            storePassword MYAPP_RELEASE_STORE_PASSWORD
            keyAlias MYAPP_RELEASE_KEY_ALIAS
            keyPassword MYAPP_RELEASE_KEY_PASSWORD
        }
    }

    defaultConfig {
        applicationId "com.anonymous.soundtherapyapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 142
        versionName "1.3.12"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    flavorDimensions "default"
    productFlavors {
        google {
            dimension "default"
            applicationIdSuffix ""
            buildConfigField "String", "DISTRIBUTION_CHANNEL", "\"googlePlay\""
            buildConfigField "String", "UPDATE_CHANNEL", "\"google\""
            buildConfigField "String", "VERSION_CHECK_URL", "\"https://play.google.com/store/apps/details?id=com.anonymous.soundtherapyapp\""
            buildConfigField "String", "APK_DOWNLOAD_BASE_URL", "\"\""
        }
        domestic {
            dimension "default"
            applicationIdSuffix ""
            buildConfigField "String", "DISTRIBUTION_CHANNEL", "\"domestic\""
            buildConfigField "String", "UPDATE_CHANNEL", "\"domestic\""
            buildConfigField "String", "VERSION_CHECK_URL", "\"\""
            buildConfigField "String", "APK_DOWNLOAD_BASE_URL", "\"https://github.com/sunislee/esonare_SoundTherapyPro/releases\""
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging false
        }
    }
    
    // Android 15 16KB 页面对齐支持
    // 强制 .so 文件以未压缩方式存储，方便 Google Play 进行 16KB 对齐
    aaptOptions {
        noCompress 'so'
    }
}

// 动态命名 AAB 文件 - GooglePlay 渠道
task renameGoogleReleaseAab {
    dependsOn "bundleGoogleRelease"
    doLast {
        def appName = "HeartSound"
        def versionName = android.defaultConfig.versionName
        def versionCode = android.defaultConfig.versionCode
        def buildDate = new Date().format('yyyyMMdd')
        def channel = "GooglePlay"
        
        def newFileName = "${appName}_v${versionName}_FINAL_vc${versionCode}_${buildDate}.aab"
        def outputDir = new File("${project.buildDir}/outputs/bundle/googleRelease")
        def originalFile = new File(outputDir, "app-google-release.aab")
        def newFile = new File(outputDir, newFileName)
        
        if (originalFile.exists()) {
            originalFile.renameTo(newFile)
            
            // 复制到 Releases/GooglePlay/ 目录
            def releasesDir = new File("${project.rootDir}/../Releases/GooglePlay")
            releasesDir.mkdirs()
            def targetFile = new File(releasesDir, newFileName)
            org.apache.commons.io.FileUtils.copyFile(newFile, targetFile)
            
            println "\n=== AAB 文件生成成功 ==="
            println "渠道：${channel}"
            println "文件名：${newFileName}"
            println "本地路径：${newFile.absolutePath}"
            println "发布路径：${targetFile.absolutePath}"
            println "==========================\n"
        }
    }
}

// 【关键】APK 16KB 对齐任务 - 用于本地测试
task align16kGoogleReleaseApk {
    dependsOn "assembleGoogleRelease"
    doLast {
        def zipalignPath = "${android.sdkDirectory}/build-tools/36.0.0/zipalign"
        def apkDir = new File("${project.buildDir}/outputs/apk/google/release")
        def originalApk = new File(apkDir, "app-google-release.apk")
        def alignedApk = new File(apkDir, "app-google-release-16k.apk")
        
        if (originalApk.exists()) {
            println "\n=== 执行 APK 16KB 对齐 ==="
            def zipalignCmd = "${zipalignPath} -P 16 -f 4 ${originalApk.absolutePath} ${alignedApk.absolutePath}"
            def process = zipalignCmd.execute()
            process.waitFor()
            
            if (process.exitValue() == 0) {
                println "✅ 16KB 对齐成功"
                println "对齐后文件：${alignedApk.absolutePath}"
                
                // 验证对齐
                def verifyCmd = "${zipalignPath} -c -v -P 16 4 ${alignedApk.absolutePath}"
                def verifyProcess = verifyCmd.execute()
                verifyProcess.waitFor()
                
                if (verifyProcess.exitValue() == 0) {
                    println "✅ 验证通过：所有文件已 16KB 对齐"
                } else {
                    println "❌ 验证失败：${verifyProcess.err.text}"
                }
            } else {
                println "❌ 16KB 对齐失败：${process.err.text}"
            }
        }
    }
}

