        def originalFile = new File(outputDir, "app-domestic-release.aab")
        def newFile = new File(outputDir, newFileName)
        
        if (originalFile.exists()) {
            originalFile.renameTo(newFile)
            
            def releasesDir = new File("${project.rootDir}/../Releases/Domestic")
            releasesDir.mkdirs()
            def targetFile = new File(releasesDir, newFileName)
            org.apache.commons.io.FileUtils.copyFile(newFile, targetFile)
            
            println "\n=== AAB 文件生成成功 (国内版) ==="
            println "渠道：${channel}"
