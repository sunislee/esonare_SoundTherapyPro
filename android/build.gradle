// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "25.1.8937393"  // 暂时回退到 NDK r25，先保证编译通过
        kotlinVersion = "1.9.22"
    }
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/jcenter' }
    google()
    mavenCentral()
    maven {
      url("../node_modules/@react-native/gradle-plugin")
    }
    maven {
      url("../node_modules")
    }
  }
  dependencies {
        classpath('com.android.tools.build:gradle:8.2.1')
        classpath('com.facebook.react:react-native-gradle-plugin:0.73.4')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22')
        classpath('com.google.gms:google-services:4.4.1')
        classpath('com.google.firebase:firebase-crashlytics-gradle:2.9.9')
    }
}

// 强制所有任务禁用警告转错误，包括 buildscript 阶段
allprojects {
    configurations.all {
        resolutionStrategy {
            force "com.swmansion.rnscreens:react-native-screens:3.29.0"
        }
    }
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            allWarningsAsErrors = false
        }
    }
}

allprojects {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/jcenter' }
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "com.facebook.react.rootproject"
