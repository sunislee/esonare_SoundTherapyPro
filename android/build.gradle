// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 35   // 强制保持 SDK 35，继续通过库升级和编译参数解决 16KB 页面对齐问题
        ndkVersion = "27.1.12297006"  // 升级到 NDK r27 以支持 16KB 页面对齐 (默认开启)
        kotlinVersion = "1.9.22"
    }
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/jcenter' }
    google()
    mavenCentral()
    maven {
      url("../node_modules/@react-native/gradle-plugin")
    }
    maven {
      url("../node_modules")
    }
  }
  dependencies {
        classpath('com.android.tools.build:gradle:8.2.1')
        classpath('com.facebook.react:react-native-gradle-plugin:0.73.4')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22')
        classpath('com.google.gms:google-services:4.4.1')
        classpath('com.google.firebase:firebase-crashlytics-gradle:2.9.9')
    }
}

// 强制所有任务禁用警告转错误，包括 buildscript 阶段
allprojects {
    configurations.all {
        resolutionStrategy {
            force "com.swmansion.rnscreens:react-native-screens:3.31.1"
        }
    }
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            allWarningsAsErrors = false
        }
    }
    
    // 全局注入 16KB 页面对齐编译参数，确保所有 native 模块 (CMake/ndk-build) 强制 16KB 对齐
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android.defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON", "-DANDROID_LINKER_FLAGS=-Wl,-z,common-page-size=16384 -Wl,-z,max-page-size=16384", "-DANDROID_EXTRACT_NATIVE_LIBS=false", "-DANDROID_ALIGNED_AS_16KB=true"
                        cppFlags "-fpermissive -w"
                    }
                    ndkBuild {
                        arguments "APP_LDFLAGS+=-Wl,-z,common-page-size=16384", "APP_LDFLAGS+=-Wl,-z,max-page-size=16384"
                    }
                }
            }
        }
    }
}

allprojects {
  repositories {
    maven { url 'https://maven.aliyun.com/repository/google' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/jcenter' }
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "com.facebook.react.rootproject"
