# GitHub Pages 部署工作流
# 用于部署心声冥想 (HeartSound Meditation) Web 应用到 GitHub Pages

name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时触发
  push:
    branches:
      - main
    # 监听 web 相关文件的变更
    paths:
      - 'web/**'
      - 'webpack.config.js'
      - 'package.json'
      - '.github/workflows/static.yml'
  
  # 允许手动触发
  workflow_dispatch:

# 设置权限 - 确保 GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制，防止同时部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 部署任务
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true
      
      - name: Create web-build directory
        run: |
          mkdir -p web-build
          echo "✅ web-build 目录已创建"
      
      - name: Copy landing page
        run: |
          if [ -f "web-build/index.html" ]; then
            echo "ℹ️ 使用现有的 index.html"
          else
            echo "📄 创建占位页面..."
            cat > web-build/index.html << 'EOF'
            <!DOCTYPE html>
            <html lang="zh-CN">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>心声冥想 - HeartSound Meditation</title>
              <style>
                body {
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                  color: white;
                  min-height: 100vh;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  text-align: center;
                  padding: 20px;
                }
                .container { max-width: 600px; }
                h1 { font-size: 2.5rem; margin-bottom: 1rem; }
                p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; }
                .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
                .links a {
                  color: white;
                  text-decoration: none;
                  padding: 12px 24px;
                  background: rgba(255,255,255,0.2);
                  border-radius: 8px;
                  border: 2px solid rgba(255,255,255,0.3);
                }
              </style>
            </head>
            <body>
              <div class="container">
                <h1>🧘 心声冥想</h1>
                <p>HeartSound Meditation</p>
                <p>专业的冥想和放松音频平台</p>
                <div class="links">
                  <a href="legal/">📄 隐私政策 Privacy Policy</a>
                  <a href="legal/terms.html">📋 服务条款 Terms of Service</a>
                </div>
              </div>
            </body>
            </html>
            EOF
          fi
      
      - name: Copy legal directory
        run: |
          if [ -d "legal" ]; then
            cp -r legal web-build/
            echo "✅ legal 目录复制完成"
            echo "📄 legal 目录内容:"
            ls -la web-build/legal/
          else
            echo "❌ legal 目录不存在"
            exit 1
          fi
      
      - name: Verify build output
        run: |
          echo "=== 最终构建产物检查 ==="
          echo "📁 web-build 目录结构:"
          find web-build -type f | head -20
          
          echo ""
          echo "=== 文件验证 ==="
          if [ -f "web-build/index.html" ]; then
            echo "✅ index.html 存在"
          else
            echo "❌ index.html 不存在"
            exit 1
          fi
          
          if [ -f "web-build/legal/index.html" ]; then
            echo "✅ legal/index.html 存在"
          else
            echo "❌ legal/index.html 不存在"
            exit 1
          fi
          
          if [ -f "web-build/legal/terms.html" ]; then
            echo "✅ legal/terms.html 存在"
          else
            echo "❌ legal/terms.html 不存在"
            exit 1
          fi
          
          echo ""
          echo "✅ 所有必要文件已就绪!"
      
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-build
          retention-days: 7
      
      - name: Verify artifact content
        run: |
          echo "=== 验证上传内容 ==="
          echo "📁 web-build 目录内容:"
          ls -R web-build/
          echo ""
          echo "📄 index.html 内容预览:"
          head -20 web-build/index.html
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment summary
        run: |
          echo ""
          echo "==================================="
          echo "✅ 部署完成!"
          echo "==================================="
          echo "📦 访问地址：${{ steps.deployment.outputs.page_url }}"
          echo "📦 隐私政策：${{ steps.deployment.outputs.page_url }}legal/"
          echo "📦 服务条款：${{ steps.deployment.outputs.page_url }}legal/terms.html"
          echo "==================================="
