name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Create deployment directory
        run: mkdir -p deploy
      
      - name: Copy landing page
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>心声冥想 - HeartSound Meditation</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 20px;
              }
              .container { max-width: 600px; }
              h1 { font-size: 2.5rem; margin-bottom: 1rem; }
              p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; }
              .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
              .links a {
                color: white;
                text-decoration: none;
                padding: 12px 24px;
                background: rgba(255,255,255,0.2);
                border-radius: 8px;
                border: 2px solid rgba(255,255,255,0.3);
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🧘 心声冥想</h1>
              <p>HeartSound Meditation</p>
              <p>专业的冥想和放松音频平台</p>
              <div class="links">
                <a href="legal/">📄 隐私政策 Privacy Policy</a>
                <a href="legal/terms.html">📋 服务条款 Terms of Service</a>
              </div>
            </div>
          </body>
          </html>
          EOF
      
      - name: Copy legal directory
        run: cp -r legal deploy/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
