# GitHub Pages 部署工作流
# 用于部署心声冥想 (HeartSound Meditation) Web 应用到 GitHub Pages

name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时触发
  push:
    branches:
      - main
    # 监听 web 相关文件的变更
    paths:
      - 'web/**'
      - 'webpack.config.js'
      - 'package.json'
      - '.github/workflows/static.yml'
  
  # 允许手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制，防止同时部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 部署任务
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build web application (Optional)
        run: pnpm build:web || true
        continue-on-error: true
      
      - name: Copy legal directory
        run: |
          if [ ! -d "web-build" ]; then
            mkdir -p web-build
          fi
          cp -r legal web-build/
          echo "✅ legal 目录复制完成"
      
      - name: Check build output
        run: |
          echo "=== 检查构建产物 ==="
          ls -la web-build/
          if [ -f "web-build/index.html" ]; then
            echo "✅ index.html 存在"
          else
            echo "⚠️ index.html 不存在，创建占位页面"
            cat > web-build/index.html << 'EOF'
            <!DOCTYPE html>
            <html lang="zh-CN">
            <head>
              <meta charset="UTF-8">
              <title>心声冥想 - HeartSound Meditation</title>
            </head>
            <body>
              <h1>🧘 心声冥想</h1>
              <p>HeartSound Meditation</p>
              <p><a href="legal/">隐私政策 Privacy Policy</a></p>
            </body>
            </html>
            EOF
          fi
          
          if [ -d "web-build/legal" ]; then
            echo "✅ legal 目录存在"
            ls -la web-build/legal/
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-build
          retention-days: 7
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment summary
        run: |
          echo "✅ 部署完成!"
          echo "📦 访问地址：${{ steps.deployment.outputs.page_url }}"
          echo "📦 完整 URL: https://sunislee.github.io/esonare_SoundTherapyPro/"
