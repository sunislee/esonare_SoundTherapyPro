# ============================================================
# 心声冥想 - 腾讯云 Nginx 资源配置
# 用途：解决 403 Forbidden，允许音频资源下载
# ============================================================

# 在 nginx.conf 的 http {} 块中添加或修改以下配置

http {
    # ... 其他现有配置 ...

    # 【新增】MIME 类型配置 - 确保音频文件类型正确
    types {
        audio/mpeg mp3;
        audio/mp4 m4a;
        audio/wav wav;
        audio/x-wav wav;
        application/octet-stream m4a;
    }

    server {
        listen 80;
        server_name 43.138.58.71;

        # 主站点配置
        location / {
            root html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 【新增/修改】音频资源配置 - 解决 403 问题
        location /resources/ {
            # 物理路径（根据你的实际路径调整）
            alias C:/Users/Administrator/Desktop/nginx-1.24.0/nginx-1.24.0/html/resources/;
            
            # 开启目录浏览（可选，方便调试）
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            
            # 允许所有 HTTP 方法
            limit_except GET HEAD {
                deny all;
            }
            
            # 跨域配置（如果需要）
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            
            # 音频文件缓存优化
            expires 30d;
            add_header Cache-Control "public, immutable";
            
            # 正确的 Content-Type
            types {
                audio/mpeg mp3;
                audio/mp4 m4a;
                audio/wav wav;
            }
            default_type application/octet-stream;
        }

        # 【可选】静态资源配置
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)$ {
            root html;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}

# ============================================================
# Windows 服务器上执行步骤：
# ============================================================
# 1. 停止 Nginx:
#    nginx -s stop
#
# 2. 修改配置文件：
#    编辑 C:\Users\Administrator\Desktop/nginx-1.24.0\nginx-1.24.0\conf\nginx.conf
#    将上面的配置添加或替换进去
#
# 3. 测试配置是否正确：
#    nginx -t
#
# 4. 启动 Nginx:
#    start nginx
#
# 5. 验证配置：
#    curl -I http://43.138.58.71/resources/
#    应该返回 200 OK 而不是 403 Forbidden
# ============================================================

# ============================================================
# 如果仍然出现 403，检查文件夹权限：
# ============================================================
# 在 Windows 服务器上以管理员身份运行 PowerShell：
# 
# $path = "C:\Users\Administrator\Desktop\nginx-1.24.0\nginx-1.24.0\html\resources"
# icacls $path /grant Everyone:(OI)(CI)R
# ============================================================
